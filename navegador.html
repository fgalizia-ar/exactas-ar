<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Navegación Campus AR - Cámara</title>
    
    <script src="https://cdn.jsdelivr.net/gh/aframevr/aframe@v1.4.2/dist/aframe-master.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js" async crossorigin="anonymous" data-preload-chunks="slam"></script>
    
    <script src="mapa.js"></script>

    <style>
        #menu-ui {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 8px;
            font-family: sans-serif;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 85%;
            max-width: 320px;
        }
        select { padding: 8px; font-size: 15px; margin-bottom: 8px; width: 100%; border-radius: 6px; border: 1px solid #ccc; }
        #indicador-distancia, #indicador-posicion { font-size: 12px; color: #333; font-weight: bold; margin-bottom: 5px; }
        .btn-dev { background: #007AFF; color: white; border: none; padding: 8px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; margin: 2px; }
        .btn-reset { background: #FF3B30; }
        .btn-volver { background: #555; text-decoration: none; display: inline-block; padding: 8px 12px; border-radius: 4px; color: white; font-size: 12px; margin: 2px; }

        /* CARTEL PARPADEANTE DE CALIBRACIÓN */
        #cartel-calibracion {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0, 0, 0, 0.85);
            color: #FFCC00; /* Amarillo de advertencia técnico */
            padding: 12px 20px;
            border-radius: 30px;
            font-family: sans-serif;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: 80%;
            max-width: 300px;
            border: 2px solid #FFCC00;
            animation: parpadeo 1.5s infinite;
            display: block;
        }

        @keyframes parpadeo {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="cartel-calibracion">
        ⚠️ Por favor, apunte a un código QR de entrada para calibrar
    </div>

    <div id="menu-ui">
        <h4 id="titulo-edificio" style="margin: 0 0 10px 0; color: #007AFF;">Navegador AR</h4>
        <label for="aulas"><strong>Destino Seleccionado:</strong> </label><br>
        <select id="aulas">
            </select>

        <div id="indicador-posicion">Posición: (X: 0.0, Y: 0.0, Z: 0.0)</div>
        <div id="indicador-distancia">Distancia al aula: -- m</div>
        
        <div>
            <button class="btn-dev" id="btn-avanzar">Avanzar 2 metros</button>
            <button class="btn-dev btn-reset" id="btn-reset">Reset</button>
            <a href="index.html" class="btn-volver">Volver al Plano</a>
        </div>
    </div>

    <a-scene xrweb="allowedDevices: any" vr-mode-ui="enabled: false">
      <a-camera id="camera" position="0 1.6 0"></a-camera>
      <a-light type="ambient" intensity="0.8"></a-light>

      <a-entity id="guia-navegacion" position="0 0.5 -2" visible="false">
          <a-box width="0.15" height="0.01" depth="0.5" color="#FF3B30" position="0 0 0"></a-box>
          <a-triangle color="#FF3B30" 
                      vertex-a="0 0 -0.55" 
                      vertex-b="-0.2 0 -0.25" 
                      vertex-c="0.2 0 -0.25" 
                      material="side: double">
          </a-triangle>
      </a-entity>
    </a-scene>

    <script>
        let usuarioPos = { x: 0, y: 0, z: 0 }; 
        let destinoActual = "none";
        let edificioActual = "";

        // DICCIONARIO OFICIAL ACTUALIZADO DE AULAS POR EDIFICIO
        const AULAS_POR_EDIFICIO = {
            quimica: [
                { value: "PASTEUR", label: "Lab. Pasteur (1° Piso)" },
                { value: "INORGANICA", label: "Lab. Qca. Inorgánica (1° Piso)" },
                { value: "VUCETICH", label: "Aula Vucetich (1° Piso)" },
                { value: "INTRODUCCION", label: "Lab. Introducción a la Qca. (1° Piso)" },
                { value: "LAB_CHICO", label: "Laboratorio chico (1° Piso)" },
                { value: "ORGANICA_SUP", label: "Lab. Qca. Orgánica Superior (1° Piso)" },
                { value: "ANALITICA_1", label: "Lab. Qca. Analítica I (1° Piso)" },
                { value: "BANYO_S_GENERO", label: "Baño sin género (1° Piso)" },
                { value: "ASCENSOR_P1", label: "Ascensor (1° Piso)" },
                { value: "SALIDA_EMERGENCIA_P1", label: "Salida Emergencia (1° Piso)" }
            ],
            herrero: [
                { value: "AULA_101", label: "Aula 101 - PB" },
                { value: "AULA_102", label: "Aula 102 - PB" }
            ],
            fisica: [{ value: "none", label: "-- Próximamente Edificio de Física --" }],
            matematica: [{ value: "none", label: "-- Próximamente Edificio de Matemática --" }],
            abuelas: [{ value: "none", label: "-- Próximamente Edificio Abuelas --" }]
        };

        const selectorAulas = document.getElementById('aulas');
        const tituloEdificio = document.getElementById('titulo-edificio');
        const cartelCalibracion = document.getElementById('cartel-calibracion');
        const guiaNavegacion = document.getElementById('guia-navegacion');
        const indicadorDistancia = document.getElementById('indicador-distancia');
        const indicadorPosicion = document.getElementById('indicador-posicion');
        const btnAvanzar = document.getElementById('btn-avanzar');
        const btnReset = document.getElementById('btn-reset');

        // CARGA INICIAL: Sincronización y lectura de la URL (?edificio=X&destino=Y)
        window.addEventListener('DOMContentLoaded', () => {
            const parametrosURL = new URLSearchParams(window.location.search);
            edificioActual = parametrosURL.get('edificio') || 'quimica';
            const destinoInicial = parametrosURL.get('destino') || 'none';

            // Corrección explícita de los títulos de la interfaz de usuario
            const nombresFormateados = {
                herrero: "Edificio Herrero Ducloux",
                quimica: "Edificio de Química",
                fisica: "Edificio de Física",
                matematica: "Edificio de Matemática",
                abuelas: "Edificio Abuelas de Plaza de Mayo"
            };
            tituloEdificio.innerText = nombresFormateados[edificioActual] || "Navegador AR";

            // Rellenar menú desplegable dinámico
            selectorAulas.innerHTML = '<option value="none">-- Selecciona destino --</option>';
            const listaAulas = AULAS_POR_EDIFICIO[edificioActual] || [];
            listaAulas.forEach(aula => {
                const option = document.createElement('option');
                option.value = aula.value;
                option.innerText = aula.label;
                selectorAulas.appendChild(option);
            });

            // Si vino un destino preseleccionado desde el buscador global, lo inyectamos directamente
            if (destinoInicial !== 'none' && listaAulas.some(a => a.value === destinoInicial)) {
                selectorAulas.value = destinoInicial;
                destinoActual = destinoInicial;
                actualizarNavegacion();
            }
        });

        // RECONOCIMIENTO REAL DE MARCADORES QR (Lógica de Calibración 8th Wall)
        // Registramos un componente de A-Frame para interceptar cuando la cámara escanea el QR en el plano real
        AFRAME.registerComponent('reconocedor-qr-calibracion', {
            init: function () {
                this.el.addEventListener('xrimagefound', (e) => {
                    // El nombre del target QR impreso debe coincidir con el nodo inicial configurado en mapa.js
                    const nombreQrEscaneado = e.detail.name; // Ej: "ENTRADA_47"
                    
                    if (MAPA_CAMPUS.nodos[nombreQrEscaneado]) {
                        // Reseteamos las coordenadas del usuario al punto exacto donde está pegado el cartel físico
                        usuarioPos = { ...MAPA_CAMPUS.nodos[nombreQrEscaneado] };
                        
                        // Ocultamos el cartel de advertencia visual
                        cartelCalibracion.style.display = 'none';
                        console.log(`Calibración exitosa. Ubicación inicial fijada en QR: ${nombreQrEscaneado}`);
                        
                        actualizarNavegacion();
                    }
                });
            }
        });
        // Inyectamos dinámicamente el componente de escaneo a la escena activa
        document.querySelector('a-scene').setAttribute('reconocedor-qr-calibracion', '');


        // MOTOR DE NAVEGACIÓN Y CÁLCULO DE CAMINO ÓPTIMO (Dijkstra 3D)
        function actualizarNavegacion() {
            if (destinoActual === 'none') {
                guiaNavegacion.setAttribute('visible', 'false');
                indicadorDistancia.innerText = "Distancia al aula: -- m";
                return;
            }

            let nodoMasCercano = "ENTRADA_47"; 
            let SkinnerDistancia = Infinity;
            
            // Hallar en qué coordenada del grafo se encuentra parado el usuario actualmente
            for (let nombreNodo in MAPA_CAMPUS.nodos) {
                let d = calcularDistancia3D(usuarioPos, MAPA_CAMPUS.nodos[nombreNodo]);
                if (d < SkinnerDistancia) {
                    SkinnerDistancia = d;
                    nodoMasCercano = nombreNodo;
                }
            }

            let distanciaAlDestinoFinal = calcularDistancia3D(usuarioPos, MAPA_CAMPUS.nodos[destinoActual]);
            
            // Margen de llegada (menos de 80 centímetros es meta alcanzada)
            if (distanciaAlDestinoFinal < 0.8) {
                guiaNavegacion.setAttribute('visible', 'false');
                indicadorDistancia.innerText = "¡Has llegado a tu destino!";
                return;
            }

            // Ejecutar el algoritmo de Dijkstra importado desde mapa.js
            const resultado = encontrarCaminoOptimo(nodoMasCercano, destinoActual);
            const ruta = resultado.ruta;

            if (ruta.length < 2) {
                orientarFlechaHacia(MAPA_CAMPUS.nodos[destinoActual]);
                indicadorDistancia.innerText = `Distancia al aula: ${distanciaAlDestinoFinal.toFixed(1)} metros`;
            } else {
                let siguientePuntoControl = MAPA_CAMPUS.nodos[ruta[1]];
                orientarFlechaHacia(siguientePuntoControl);
                
                let distanciaAlSiguienteNodo = calcularDistancia3D(usuarioPos, siguientePuntoControl);
                let distanciaTotalCalculada = distanciaAlSiguienteNodo + (resultado.distanciaTotal - calcularDistancia3D(MAPA_CAMPUS.nodos[nodoMasCercano], siguientePuntoControl));
                indicadorDistancia.innerText = `Distancia al aula: ${distanciaTotalCalculada.toFixed(1)} metros`;
            }
            
            guiaNavegacion.setAttribute('visible', 'true');
            indicadorPosicion.innerText = `Posición: (X: ${usuarioPos.x.toFixed(1)}, Y: ${usuarioPos.y.toFixed(1)}, Z: ${usuarioPos.z.toFixed(1)})`;
        }

        function orientarFlechaHacia(targetCoords) {
            const dx = targetCoords.x - usuarioPos.x;
            const dy = targetCoords.y - usuarioPos.y; 
            const dz = targetCoords.z - usuarioPos.z;

            const anguloHorizontal = (Math.atan2(dx, dz) * 180 / Math.PI) + 180;
            const distanciaHorizontal = Math.sqrt(dx * dx + dz * dz);
            let anguloVertical = Math.atan2(dy, distanciaHorizontal) * 180 / Math.PI;
            
            guiaNavegacion.setAttribute('rotation', `${anguloVertical} ${anguloHorizontal} 0`);
        }

        selectorAulas.addEventListener('change', (e) => {
            destinoActual = e.target.value;
            actualizarNavegacion();
        });


        // BOTONES DE DESARROLLO Y DIAGNÓSTICO (Alpha Tester)
        btnAvanzar.addEventListener('click', () => {
            if (destinoActual === 'none') return;
            cartelCalibracion.style.display = 'none'; // El bypass de simulación asume calibración implícita
            
            const targetNodo = MAPA_CAMPUS.nodos[destinoActual];
            const esPrimerPiso = (targetNodo.y > 0);

            if (esPrimerPiso) {
                if (usuarioPos.y < 5.3 && usuarioPos.z > -12.0) {
                    usuarioPos.z -= 2.0;
                } else if (usuarioPos.z <= -12.0 && usuarioPos.y < 5.3) {
                    usuarioPos.y += 1.325;
                    if(usuarioPos.y > 5.3) usuarioPos.y = 5.3;
                } else if (usuarioPos.y >= 5.3 && usuarioPos.z > targetNodo.z) {
                    usuarioPos.z -= 2.0;
                    if(usuarioPos.z < targetNodo.z && targetNodo.x === 0) usuarioPos.z = targetNodo.z;
                } else {
                    if (usuarioPos.x < targetNodo.x) {
                        usuarioPos.x += 1.0;
                        if(usuarioPos.x > targetNodo.x) usuarioPos.x = targetNodo.x;
                    } else if (usuarioPos.x > targetNodo.x) {
                        usuarioPos.x -= 1.0;
                        if(usuarioPos.x < targetNodo.x) usuarioPos.x = targetNodo.x;
                    }
                }
            } else {
                if (usuarioPos.z > -8.0) {
                    usuarioPos.z -= 2.0;
                } else {
                    if (destinoActual === "AULA_101") {
                        if (usuarioPos.x > -6.0) usuarioPos.x -= 2.0;
                        else if (usuarioPos.z > -14.0) usuarioPos.z -= 2.0;
                    }
                    if (destinoActual === "AULA_102") {
                        if (usuarioPos.x < 10.0) usuarioPos.x += 2.0;
                    }
                }
            }
            actualizarNavegacion();
        });

        btnReset.addEventListener('click', () => {
            usuarioPos = { x: 0, y: 0, z: 0 };
            destinoActual = "none";
            selectorAulas.value = "none";
            cartelCalibracion.style.display = 'block';
            actualizarNavegacion();
        });
    </script>
</body>
</html>
