<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido al Campus - Navegación AR</title>
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            background: #f4f4f7; 
            margin: 0; 
            padding: 20px; 
        }
        
        .contenedor-mapa { 
            max-width: 550px; 
            margin: 20px auto; 
            background: white; 
            padding: 15px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        }

        /* ESTILOS INTERACTIVOS PARA LOS EDIFICIOS DEL SVG */
        svg { 
            width: 100%; 
            height: auto; 
            display: block; 
        }
        
        /* Efecto visual al pasar el cursor o pulsar sobre los ID interactivos de Inkscape */
        #herrero, #quimica, #fisica, #matematica, #abuelas {
            cursor: pointer;
            transition: fill 0.2s ease, opacity 0.2s ease;
        }

        /* Iluminación interactiva del edificio seleccionado en el campus */
        #herrero:hover, #quimica:hover, #fisica:hover, #matematica:hover, #abuelas:hover {
            fill: #007AFF !important;
            opacity: 0.8;
        }

        .selector-contenedor {
            margin-top: 20px;
        }

        select {
            padding: 10px 16px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
            background-color: white;
            cursor: pointer;
        }
    </style>
</head>

    <div class="selector-contenedor">
        <label for="selector-edificios"><strong>Buscar Edificio:</strong> </label>
        <select id="selector-edificios">
            <option value="" disabled selected>Seleccioná una opción...</option>
            <option value="herrero">Edificio Herrero Ducloux</option>
            <option value="quimica">Edificio de Química</option>
            <option value="fisica">Edificio de Física</option>
            <option value="matematica">Edificio de Matemática</option>
            <option value="abuelas">Edificio Abuelas de Plaza de Mayo</option>
        </select>
    </div>

    <script>
        // Array de IDs exactos asignados en Inkscape para asociar la interacción
        const edificiosId = ["herrero", "quimica", "fisica", "matematica", "abuelas"];

        // 1. Vinculación dinámica de los clics en los paths del plano real
        document.addEventListener("DOMContentLoaded", () => {
            edificiosId.forEach(id => {
                const elementoSVG = document.getElementById(id);
                if (elementoSVG) {
                    elementoSVG.addEventListener('click', () => {
                        redireccionarANavegador(id);
                    });
                }
            });
        });

        // 2. Vinculación del menú desplegable clásico
        document.getElementById('selector-edificios').addEventListener('change', (e) => {
            const idEdificio = e.target.value;
            if (idEdificio) {
                redireccionarANavegador(idEdificio);
            }
        });

        // Función centralizada para derivar el flujo hacia el entorno de Realidad Aumentada
        function redireccionarANavegador(edificio) {
            window.location.href = `navegador.html?edificio=${edificio}`;
        }
    </script>
