<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido al Campus - Navegación AR</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f7; margin: 0; padding: 20px; }
        
        .contenedor-mapa { 
            max-width: 550px; 
            margin: 20px auto; \n            background: white; 
            padding: 15px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        }

        /* ESTILOS INTERACTIVOS PARA LOS EDIFICIOS DEL SVG */
        svg { width: 100%; height: auto; display: block; }
        
        /* Aplica el efecto visual a los ID que configuraste en Inkscape */
        #herrero, #quimica, #fisica, #matematica, #abuelas {
            cursor: pointer;
            transition: fill 0.2s ease, opacity 0.2s ease;
        }

        /* Al pasar el dedo o el mouse sobre cualquiera de los bloques del campus */
        #herrero:hover *, #quimica:hover *, #fisica:hover *, #matematica:hover *, #abuelas:hover * {
            fill: #007AFF !important; /* Color azul institucional al destacar */
            opacity: 0.85;
        }

        .instruccion { color: #555; font-size: 14px; padding: 0 10px; }

        /* SECCIÓN DEL BUSCADOR ALFABÉTICO */
        .contenedor-buscador {
            max-width: 550px;
            margin: 25px auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: left;
        }
        .contenedor-buscador h3 { margin-top: 0; color: #333; font-size: 16px; border-bottom: 2px solid #007AFF; padding-bottom: 6px;}
        .input-busqueda {
            width: 100%;
            padding: 10px;
            font-size: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            margin-bottom: 12px;
        }
        .lista-resultados {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #eee;
            border-radius: 6px;
        }
        .lista-resultados li {
            padding: 10px 12px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.15s ease;
        }
        .lista-resultados li:last-child { border-bottom: none; }
        .lista-resultados li:hover { background: #e6f2ff; }
        .badge-edificio {
            font-size: 11px;
            background: #E1E8ED;
            color: #475569;
            padding: 3px 8px;
            border-radius: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Navegador Campus AR</h1>
    <p class="instruccion">Selecciona el edificio al que deseas dirigirte tocando el plano o buscando tu aula específica abajo:</p>

    <div class="contenedor-mapa">
        <svg width="142.28329mm" height="134.01868mm" viewBox="0 0 142.28329 134.01868" version="1.1" id="svg4621" xmlns="http://www.w3.org/2000/svg">
            <g id="g3245">
                <rect y="0.30798021" x="0.24999937" height="133.71068" width="142.03329" id="rect3857" style="fill:#f7f7f7;" />
                <path d="m 31.578311,51.76559 ... " id="herrero" class="edificio-click" style="fill:#ff5555;stroke:#000000;stroke-width:0.3;" />
                <path d="m 35.176533,53.39598 ... " id="quimica" class="edificio-click" style="fill:#ff5555;stroke:#000000;stroke-width:0.3;" />
                <path d="m 69.482652,44.18861 ... " id="fisica" class="edificio-click" style="fill:#ff5555;stroke:#000000;stroke-width:0.3;" />
                <path d="m 102.23253,47.01112 ... " id="matematica" class="edificio-click" style="fill:#ff5555;stroke:#000000;stroke-width:0.3;" />
                <path d="m 89.058751,10.84022 ... " id="abuelas" class="edificio-click" style="fill:#ff5555;stroke:#000000;stroke-width:0.3;" />
                </g>
        </svg>
    </div>

    <div class="contenedor-buscador">
        <h3>Buscador Alfabético de Aulas</h3>
        <input type="text" id="input-filtro" class="input-busqueda" placeholder="Escribe el nombre del aula o laboratorio...">
        <ul id="lista-aulas" class="lista-resultados">
            </ul>
    </div>

    <script>
        // BASE DE DATOS GLOBAL DE AULAS DEL CAMPUS (Criterio Unificado)
        const DATABASE_AULAS = [
            // Pabellón de Química
            { id: "PASTEUR", nombre: "Laboratorio Pasteur (1° Piso)", edificio: "quimica", edificioEtiqueta: "Química" },
            { id: "INORGANICA", nombre: "Laboratorio de Qca. Inorgánica (1° Piso)", edificio: "quimica", edificioEtiqueta: "Química" },
            { id: "VUCETICH", nombre: "Aula Vucetich (1° Piso)", edificio: "quimica", edificioEtiqueta: "Química" },
            { id: "INTRODUCCION", nombre: "Laboratorio de Introducción a la Química (1° Piso)", edificio: "quimica", edificioEtiqueta: "Química" },
            { id: "LAB_CHICO", nombre: "Laboratorio Chico (1° Piso)", edificio: "quimica", edificioEtiqueta: "Química" },
            { id: "ORGANICA_SUP", nombre: "Laboratorio de Qca. Orgánica Superior (1° Piso)", edificio: "quimica", edificioEtiqueta: "Química" },
            { id: "ANALITICA_1", nombre: "Laboratorio de Qca. Analítica I (1° Piso)", edificio: "quimica", edificioEtiqueta: "Química" },
            { id: "BANYO_S_GENERO", nombre: "Baño sin género (1° Piso)", edificio: "quimica", edificioEtiqueta: "Química" },
            
            // Espacios para otros edificios listos para cuando se expandan sus redes
            { id: "AULA_101", nombre: "Aula 101 - Planta Baja", edificio: "herrero", edificioEtiqueta: "Herrero" },
            { id: "AULA_102", nombre: "Aula 102 - Planta Baja", edificio: "herrero", edificioEtiqueta: "Herrero" }
        ];

        // 1. Eventos para clics en los elementos interactivos del plano vectorial
        const edificiosId = ["herrero", "quimica", "fisica", "matematica", "abuelas"];
        document.addEventListener("DOMContentLoaded", () => {
            edificiosId.forEach(id => {
                const elementoSVG = document.getElementById(id);
                if (elementoSVG) {
                    elementoSVG.addEventListener('click', () => {
                        redireccionarANavegador(id);
                    });
                }
            });
            // Render inicial de la lista completa
            renderizarListaAulas(DATABASE_AULAS);
        });

        // 2. Lógica del motor de búsqueda en tiempo real
        const inputFiltro = document.getElementById('input-filtro');
        inputFiltro.addEventListener('input', (e) => {
            const textoBusqueda = e.target.value.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            
            const aulasFiltradas = DATABASE_AULAS.filter(aula => {
                const nombreNormalizado = aula.nombre.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                return nombreNormalizado.includes(textoBusqueda);
            });
            
            renderizarListaAulas(aulasFiltradas);
        });

        // 3. Generador dinámico de elementos de lista en el HTML
        function renderizarListaAulas(aulas) {
            const listaUL = document.getElementById('lista-aulas');
            listaUL.innerHTML = ''; // Limpiar previo

            if(aulas.length === 0) {
                listaUL.innerHTML = '<li style="color:#999; cursor:default;">No se encontraron aulas que coincidan.</li>';
                return;
            }

            // Ordenar alfabéticamente por nombre
            aulas.sort((a, b) => a.nombre.localeCompare(b.nombre));

            aulas.forEach(aula => {
                const li = document.createElement('li');
                li.innerHTML = `<span>${aula.nombre}</span> <span class="badge-edificio">${aula.edificioEtiqueta}</span>`;
                li.addEventListener('click', () => {
                    redireccionarANavegador(aula.edificio, aula.id);
                });
                listaUL.appendChild(li);
            });
        }

        // 4. Redirección parametrizada inteligente
        function redireccionarANavegador(edificio, destinoId = "none") {
            window.location.href = `navegador.html?edificio=${edificio}&destino=${destinoId}`;
        }
    </script>
</body>
</html>
