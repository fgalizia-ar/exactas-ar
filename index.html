<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido al Campus - Navegación AR</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f7; margin: 0; padding: 20px; }
        
        .contenedor-mapa { 
            max-width: 550px; 
            margin: 20px auto; 
            background: white; 
            padding: 15px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        }

        /* ESTILOS INTERACTIVOS PARA LOS EDIFICIOS DEL SVG */
        svg { width: 100%; height: auto; display: block; }
        
        /* Aplica el efecto visual a los ID que configuraste en Inkscape */
        #herrero, #quimica, #fisica, #matematica, #abuelas {
            cursor: pointer;
            transition: fill 0.2s ease, opacity 0.2s ease;
        }

        /* Al pasar el dedo o el mouse sobre cualquiera de los bloques del campus */
        #herrero:hover, #quimica:hover, #fisica:hover, #matematica:hover, #abuelas:hover {
            fill: #007AFF !important; /* Color azul institucional al destacar */
            opacity: 0.85;
        }

        select { width: 100%; max-width: 320px; padding: 12px; font-size: 16px; border-radius: 8px; margin-top: 15px; }
        .instruccion { color: #555; font-size: 14px; padding: 0 10px; }
    </style>
</head>
<body>

    <h1>Navegador Campus AR</h1>
    <p class="instruccion">Selecciona el edificio al que deseas dirigirte tocando el plano o usando la lista:</p>

    <div class="contenedor-mapa">
        </div>

    <div>
        <select id="selector-edificios">
            <option value="">-- O selecciona un edificio de la lista --</option>
            <option value="quimica">Edificio de Química</option>
            <option value="herrero">Edificio Herrero Ducloux</option>
            <option value="fisica">Edificio de Física</option>
            <option value="matematica">Edificio de Matemática</option>
            <option value="abuelas">Edificio Abuelas de Plaza de Mayo</option>
        </select>
    </div>

    <script>
        // Arreglo con los IDs exactos de Inkscape para automatizar la escucha
        const edificiosId = ["herrero", "quimica", "fisica", "matematica", "abuelas"];

        // 1. Asignar dinámicamente el evento click a los elementos del SVG si existen en pantalla
        document.addEventListener("DOMContentLoaded", () => {
            edificiosId.forEach(id => {
                const elementoSVG = document.getElementById(id);
                if (elementoSVG) {
                    elementoSVG.addEventListener('click', () => {
                        redireccionarANavegador(id);
                    });
                }
            });
        });

        // 2. Manejo de selección desde el menú desplegable inferior
        document.getElementById('selector-edificios').addEventListener('change', (e) => {
            const idEdificio = e.target.value;
            if (idEdificio) {
                redireccionarANavegador(idEdificio);
            }
        });

        // Función encargada de pasar el control al entorno AR
        function redireccionarANavegador(edificio) {
            window.location.href = `navegador.html?edificio=${edificio}`;
        }
    </script>
</body>
</html>
