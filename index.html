<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido al Campus - Navegación AR</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f7; margin: 0; padding: 20px; }
        .contenedor-mapa { max-width: 500px; margin: 20px auto; position: relative; background: white; padding: 10px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        img { max-width: 100%; height: auto; display: block; }
        select { width: 100%; max-width: 320px; padding: 12px; font-size: 16px; border-radius: 8px; margin-top: 15px; }
        .instruccion { color: #555; font-size: 14px; }
    </style>
</head>
<body>

    <h1>Navegador Campus AR</h1>
    <p class="instruccion">Toca un edificio en el plano o seleccionalo de la lista:</p>

    <div class="contenedor-mapa">
        <img src="plano_campus.png" usemap="#mapa-campus" alt="Plano del Campus">
        <map name="mapa-campus">
            <area shape="rect" coords="50,50,450,450" alt="Pabellón de Química" href="navegador.html?edificio=quimica">
        </map>
    </div>

    <div>
        <select id="buscador-global">
            <option value="">-- Buscar un aula en todo el campus --</option>
            <optgroup label="Planta Baja">
                <option value="navegador.html?destino=AULA_101">Aula 101 (Química Orgánica)</option>
                <option value="navegador.html?destino=AULA_102">Aula 102 (Laboratorio Central)</option>
            </optgroup>
            <optgroup label="Pabellón de Química (1° Piso)">
                <option value="navegador.html?destino=BANYO_S_GENERO">Baño sin género</option>
                <option value="navegador.html?destino=PASTEUR">Lab. Pasteur</option>
                <option value="navegador.html?destino=INORGANICA">Lab. Qca. Inorgánica</option>
                <option value="navegador.html?destino=VUCETICH">Aula Vucetich</option>
                <option value="navegador.html?destino=INTRODUCCION">Lab. Introducción a la Qca.</option>
                <option value="navegador.html?destino=LAB_CHICO">Laboratorio chico</option>
                <option value="navegador.html?destino=ASCENSOR_P1">Ascensor</option>
                <option value="navegador.html?destino=ORGANICA_SUP">Lab. Qca. Orgánica Superior</option>
                <option value="navegador.html?destino=ANALITICA_1">Lab. Qca. Analítica I</option>
                <option value="navegador.html?destino=SALIDA_EMERGENCIA_P1">Salida de Emergencia</option>
            </optgroup>
        </select>
    </div>

    <script>
        document.getElementById('buscador-global').addEventListener('change', (e) => {
            const urlDestino = e.target.value;
            // Si el usuario seleccionó una opción válida, lo redirige automáticamente
            if (urlDestino) {
                window.location.href = urlDestino;
            }
        });
    </script>
</body>
</html>
