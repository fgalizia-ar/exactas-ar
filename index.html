<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido al Campus - Navegación AR</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f7; margin: 0; padding: 20px; }
        .contenedor-mapa { max-width: 500px; margin: 20px auto; position: relative; background: white; padding: 10px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        img { max-width: 100%; height: auto; display: block; }
        select { width: 100%; max-width: 320px; padding: 12px; font-size: 16px; border-radius: 8px; margin-top: 15px; }
        .instruccion { color: #555; font-size: 14px; }
    </style>
</head>
<body>

    <h1>Navegador Campus AR</h1>
    <p class="instruccion">Toca un edificio en el plano o seleccionalo de la lista:</p>

    <div class="contenedor-mapa">
        <img src="plano_campus.png" usemap="#mapa-campus" alt="Plano del Campus">
        
        <map name="mapa-campus">
            <area shape="rect" coords="50,50,200,200" alt="Edificio Central" href="index.html?edificio=central">
            <area shape="rect" coords="250,50,450,200" alt="Pabellón de Química" href="index.html?edificio=quimica">
        </map>
    </div>

    <div>
        <select id="buscador-global">
            <option value="">-- Buscar un aula en todo el campus --</option>
            <optgroup label="Edificio Central">
                <option value="index.html?edificio=central&destino=AULA_101">Aula 101 - PB</option>
                <option value="index.html?edificio=central&destino=AULA_102">Aula 102 - PB</option>
            </optgroup>
            <optgroup label="Pabellón de Química (1° Piso)">
                <option value="index.html?edificio=quimica&destino=PASTEUR">Lab. Pasteur</option>
                <option value="index.html?edificio=quimica&destino=INORGANICA">Lab. Qca. Inorgánica</option>
                <option value="index.html?edificio=quimica&destino=ANALITICA_1">Lab. Qca. Analítica I</option>
            </optgroup>
        </select>
    </div>

    <script>
        // Si eligen un aula directa de la lista desplegable, los redirige al edificio correcto con el destino precargado
        document.getElementById('buscador-global').addEventListener('change', (e) => {
            if (e.target.value) {
                window.location.href = e.target.value;
            }
        });
    </script>
</body>
</html>
