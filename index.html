<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido al Campus - Navegación AR</title>
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            background: #f4f4f7; 
            margin: 0; 
            padding: 20px; 
        }
        
        .contenedor-mapa { 
            max-width: 550px; 
            margin: 20px auto; 
            background: white; 
            padding: 15px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        }

        /* ESTILOS INTERACTIVOS PARA LOS EDIFICIOS DEL SVG */
        svg { 
            width: 100%; 
            height: auto; 
            display: block; 
        }
        
        /* Efecto visual al pasar el cursor o el dedo sobre los IDs de Inkscape */
        #herrero, #quimica, #fisica, #matematica, #abuelas {
            cursor: pointer;
            transition: fill 0.2s ease, opacity 0.2s ease;
        }

        #herrero:hover, #quimica:hover, #fisica:hover, #matematica:hover, #abuelas:hover {
            fill: #007AFF !important;
            opacity: 0.8;
        }

        /* SECCIÓN DEL BUSCADOR ALFABÉTICO */
        .contenedor-buscador {
            max-width: 550px;
            margin: 25px auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: left;
        }
        .contenedor-buscador h3 { 
            margin-top: 0; 
            color: #333; 
            font-size: 16px; 
            border-bottom: 2px solid #007AFF; 
            padding-bottom: 6px;
        }
        .input-busqueda {
            width: 100%;
            padding: 10px;
            font-size: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            margin-bottom: 12px;
        }
        .lista-resultados {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #eee;
            border-radius: 6px;
        }
        .lista-resultados li {
            padding: 10px 12px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.15s ease;
        }
        .lista-resultados li:last-child { border-bottom: none; }
        .lista-resultados li:hover { background: #e6f2ff; }
        
        .badge-edificio {
            font-size: 11px;
            background: #E1E8ED;
            color: #475569;
            padding: 3px 8px;
            border-radius: 12px;
            font-weight: bold;
        }

        .selector-contenedor {
            max-width: 550px;
            margin: 20px auto;
            text-align: center;
        }
        select {
            padding: 10px 16px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
            background-color: white;
            cursor: pointer;
            width: 100%;
            max-width: 350px;
        }
    </style>
</head>

    <div class="selector-contenedor">
        <label for="selector-edificios"><strong>O seleccioná un Edificio:</strong> </label><br><br>
        <select id="selector-edificios">
            <option value="" disabled selected>Seleccioná un edificio...</option>
            <option value="herrero">Edificio Herrero Ducloux</option>
            <option value="quimica">Pabellón de Química</option>
            <option value="fisica">Pabellón de Física</option>
            <option value="matematica">Departamento de Matemática</option>
            <option value="abuelas">Edificio Abuelas de Plaza de Mayo</option>
        </select>
    </div>

    <script>
        // BASE DE DATOS GLOBAL DE AULAS DEL CAMPUS (Agrega o edita las que necesites)
        const DATABASE_AULAS = [
            { id: "PASTEUR", nombre: "Laboratorio Pasteur (1° Piso)", edificio: "quimica", edificioEtiqueta: "Química" },
            { id: "INORGANICA", nombre: "Laboratorio de Qca. Inorgánica (1° Piso)", edificio: "quimica", edificioEtiqueta: "Química" },
            { id: "VUCETICH", nombre: "Aula Vucetich (1° Piso)", edificio: "quimica", edificioEtiqueta: "Química" },
            { id: "INTRODUCCION", nombre: "Laboratorio de Introducción a la Química (1° Piso)", edificio: "quimica", edificioEtiqueta: "Química" },
            { id: "LAB_CHICO", nombre: "Laboratorio Chico (1° Piso)", edificio: "quimica", edificioEtiqueta: "Química" },
            { id: "ORGANICA_SUP", nombre: "Laboratorio de Qca. Orgánica Superior (1° Piso)", edificio: "quimica", edificioEtiqueta: "Química" },
            { id: "ANALITICA_1", nombre: "Laboratorio de Qca. Analítica I (1° Piso)", edificio: "quimica", edificioEtiqueta: "Química" },
            { id: "BANYO_S_GENERO", nombre: "Baño sin género (1° Piso)", edificio: "quimica", edificioEtiqueta: "Química" }
        ];

        const edificiosId = ["herrero", "quimica", "fisica", "matematica", "abuelas"];
        
        document.addEventListener("DOMContentLoaded", () => {
            // Asignar clics a los edificios interactivos del plano real
            edificiosId.forEach(id => {
                const elementoSVG = document.getElementById(id);
                if (elementoSVG) {
                    elementoSVG.addEventListener('click', () => {
                        redireccionarANavegador(id);
                    });
                }
            });
            // Cargar lista completa en el buscador inicialmente
            renderizarListaAulas(DATABASE_AULAS);
        });

        // Motor del buscador alfabético en tiempo real
        const inputFiltro = document.getElementById('input-filtro');
        inputFiltro.addEventListener('input', (e) => {
            const textoBusqueda = e.target.value.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            
            const aulasFiltradas = DATABASE_AULAS.filter(aula => {
                const nombreNormalizado = aula.nombre.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                return nombreNormalizado.includes(textoBusqueda);
            });
            
            renderizarListaAulas(aulasFiltradas);
        });

        function renderizarListaAulas(aulas) {
            const listaUL = document.getElementById('lista-aulas');
            listaUL.innerHTML = '';

            if(aulas.length === 0) {
                listaUL.innerHTML = '<li style="color:#999; cursor:default;">No se encontraron aulas que coincidan.</li>';
                return;
            }

            aulas.sort((a, b) => a.nombre.localeCompare(b.nombre));

            aulas.forEach(aula => {
                const li = document.createElement('li');
                li.innerHTML = `<span>${aula.nombre}</span> <span class="badge-edificio">${aula.edificioEtiqueta}</span>`;
                li.addEventListener('click', () => {
                    redireccionarANavegador(aula.edificio, aula.id);
                });
                listaUL.appendChild(li);
            });
        }

        // Manejo de la selección clásica desplegable
        document.getElementById('selector-edificios').addEventListener('change', (e) => {
            const idEdificio = e.target.value;
            if (idEdificio) {
                redireccionarANavegador(idEdificio);
            }
        });

        function redireccionarANavegador(edificio, destinoId = "none") {
            window.location.href = `navegador.html?edificio=${edificio}&destino=${destinoId}`;
        }
    </script>
</body>
</html>
